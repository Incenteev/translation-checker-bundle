name: CI

on:
    push:
    pull_request:

jobs:
    check_composer:
        name: Check composer.json
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: shivammathur/setup-php@v2
              with:
                  coverage: none
                  php-version: '8.3'
            - run: composer validate --strict --no-check-lock

    static_analysis:
        name: Static analysis
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: shivammathur/setup-php@v2
              with:
                  coverage: none
                  php-version: '8.3'
            - name: Install dependencies
              run: composer update --ansi --no-progress --prefer-dist --no-interaction
            - run: vendor/bin/phpstan analyze

    tests:
        name: "Tests on PHP ${{ matrix.php }}${{ matrix.name_suffix }}"
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                php: [ '8.2', '8.3' ]
                min_stability: [ '' ]
                name_suffix: [ '' ]
                composer_flags: [ '' ]
                phpunit_flags: [ '' ]
                include:
                    - php: '8.3'
                      min_stability: 'dev'
                      name_suffix: ' (dev deps)'
                    - php: '8.2'
                      min_stability: ''
                      name_suffix: ' (lowest deps)'
                      composer_flags: '--prefer-lowest'
                      phpunit_flags: '--do-not-fail-on-deprecation'

        steps:
            -   uses: actions/checkout@v4
            -   uses: shivammathur/setup-php@v2
                with:
                    coverage: "none"
                    php-version: "${{ matrix.php }}"
                    ini-file: development

            -   name: Configure stability
                if: "matrix.min_stability != ''"
                run: composer config minimum-stability "${{ matrix.min_stability }}"

            -   name: Install dependencies
                run: composer update --ansi --no-progress --prefer-dist --no-interaction ${{ matrix.composer_flags }}

            -   name: Run tests
                run: vendor/bin/phpunit --colors=always ${{ matrix.phpunit_flags }}
